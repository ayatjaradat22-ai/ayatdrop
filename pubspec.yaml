name: ayatdrop
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_messaging: ^15.0.3
  easy_localization: ^3.0.3
  url_launcher: ^6.2.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  google_generative_ai: ^0.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/app_icon.png"
  adaptive_icon_background: "#8B2323"
  adaptive_icon_foreground: "images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - images/
    - assets/translations/
